server {
    listen 80;
    server_name localhost;

    # Nginx will serve files from /usr/share/nginx/html/<site_id>/
    # Tor Manager will map the hidden service port to: ghost_bullet_nginx:80
    # However, Nginx needs to know which folder to serve based on the host header (the .onion address).
    # We can handle this elegantly if Tor Manager symlinks the .onion string to the site ID folder,
    # or by passing the request. For simplicity, we just look at the Host header if symlinks are made.

    root /usr/share/nginx/html/$host;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ =404;
    }
}
